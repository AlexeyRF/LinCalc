<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер величин</title>
    <style>
        :root {
            --bg-main: #202020;
            --bg-sidebar: #2d2d2d;
            --btn-num: #3b3b3b;
            --btn-num-hover: #323232;
            --btn-op: #323232;
            --btn-op-hover: #3b3b3b;
            --accent: #4cc2ff;
            --accent-hover: #47b1e8;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #444;
        }

        body { 
            margin: 0; padding: 0; 
            display: flex; height: 100vh; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }

        #hamburger-btn { 
            background: transparent; border: none; color: white; 
            padding: 10px; cursor: pointer; font-size: 20px; margin-right: 10px;
            border-radius: 4px;
        }
        #hamburger-btn:hover { background: var(--btn-op-hover); }
        
        #left-nav { 
            position: fixed; top: 0; left: -250px; width: 250px; height: 100%; 
            background-color: var(--bg-sidebar); box-shadow: 2px 0 10px rgba(0,0,0,0.5); 
            z-index: 999; transition: left 0.3s ease; display: flex; flex-direction: column; padding-top: 60px; 
        }
        #left-nav.open { left: 0; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 998; display: none;
        }
        #overlay.active { display: block; }
        .nav-link { 
            color: white; text-decoration: none; padding: 15px 20px; 
            border-bottom: 1px solid var(--border-color); transition: background 0.2s; 
        }
        .nav-link:hover { background-color: #3b3b3b; border-left: 4px solid var(--accent); }

        #calculator-area {
            width: 380px;
            min-width: 380px;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
            border-right: 1px solid var(--border-color);
            margin: 0 auto;
        }

        .calc-header {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        #category-select {
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        #category-select option { background: var(--bg-sidebar); }

        .display-box {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            background-color: var(--bg-main);
            transition: background 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .display-box:hover { background-color: #262626; }
        .display-box.active {
            border-color: var(--accent);
            background-color: #2a2a2a;
        }
        .val-container {
            font-size: 38px;
            font-weight: 600;
            text-align: left;
            word-wrap: break-word;
            min-height: 45px;
            outline: none;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unit-select {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: none;
            font-size: 14px;
            margin-top: 5px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        .unit-select option { background-color: var(--bg-sidebar); color: white; }

        #comparisons {
            padding: 10px 15px;
            flex-grow: 1;
            font-size: 14px;
            overflow-y: auto;
        }
        .comp-title { color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
        .comp-item { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .comp-item::before { content: '≈'; color: var(--accent); font-weight: bold; }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-top: 10px;
            padding-bottom: 10px;
        }
        .k-btn {
            background-color: var(--btn-op); color: white; border: none; border-radius: 4px;
            font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: background 0.1s;
            height: 50px;
        }
        .k-btn:hover { background-color: var(--btn-op-hover); }
        .k-btn.num { background-color: var(--btn-num); font-weight: 500; font-size: 22px; }
        .k-btn.num:hover { background-color: var(--btn-num-hover); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleNav()"></div>
<div id="left-nav">
    <a href="graphical.html" class="nav-link">Графический калькулятор</a>
    <a href="enginer.html" class="nav-link">Инженерный калькулятор</a>
    <a href="proger.html" class="nav-link">Калькулятор программиста</a>
    <a href="convertor.html" class="nav-link" style="border-left: 4px solid var(--accent); background: #3b3b3b;">Конвертер величин</a>
</div>

<div id="calculator-area">
    <div class="calc-header">
        <button id="hamburger-btn" onclick="toggleNav()">☰</button>
        <select id="category-select" onchange="changeCategory()"></select>
    </div>

    <div class="display-box active" id="box1" onclick="setActiveBox(1)">
        <div class="val-container" id="val1">0</div>
        <select class="unit-select" id="unit1" onchange="unitChanged()"></select>
    </div>
    
    <div class="display-box" id="box2" onclick="setActiveBox(2)">
        <div class="val-container" id="val2">0</div>
        <select class="unit-select" id="unit2" onchange="unitChanged()"></select>
    </div>

    <div id="comparisons"></div>

    <div id="keyboard">
        <button class="k-btn" onclick="clearAll()">CE</button>
        <button class="k-btn" onclick="backspace()">⌫</button>
        <button class="k-btn" onclick="swapUnits()">⇅</button>

        <button class="k-btn num" onclick="insert('7')">7</button>
        <button class="k-btn num" onclick="insert('8')">8</button>
        <button class="k-btn num" onclick="insert('9')">9</button>

        <button class="k-btn num" onclick="insert('4')">4</button>
        <button class="k-btn num" onclick="insert('5')">5</button>
        <button class="k-btn num" onclick="insert('6')">6</button>

        <button class="k-btn num" onclick="insert('1')">1</button>
        <button class="k-btn num" onclick="insert('2')">2</button>
        <button class="k-btn num" onclick="insert('3')">3</button>

        <button class="k-btn num" onclick="toggleSign()">±</button>
        <button class="k-btn num" onclick="insert('0')">0</button>
        <button class="k-btn num" onclick="insert('.')">,</button>
    </div>
</div>

<script>
    const categories = {
        length: {
            name: 'Длина',
            units: {
                nm: { n: 'Нанометры', to: v=>v*1e-9, from: v=>v/1e-9 },
                mm: { n: 'Миллиметры', to: v=>v*0.001, from: v=>v/0.001 },
                cm: { n: 'Сантиметры', to: v=>v*0.01, from: v=>v/0.01 },
                m: { n: 'Метры', to: v=>v, from: v=>v },
                km: { n: 'Километры', to: v=>v*1000, from: v=>v/1000 },
                in: { n: 'Дюймы', to: v=>v*0.0254, from: v=>v/0.0254 },
                ft: { n: 'Футы', to: v=>v*0.3048, from: v=>v/0.3048 },
                mi: { n: 'Мили', to: v=>v*1609.344, from: v=>v/1609.344 }
            },
            comparisons: [
                { name: 'высот Останкинской башни', val: 540 },
                { name: 'длин Красной площади', val: 330 },
                { name: 'ростов человека', val: 1.75 }
            ],
            def1: 'm', def2: 'cm'
        },
        area: {
            name: 'Площадь',
            units: {
                mm2: { n: 'Кв. миллиметры', to: v=>v*1e-6, from: v=>v/1e-6 },
                cm2: { n: 'Кв. сантиметры', to: v=>v*1e-4, from: v=>v/1e-4 },
                m2: { n: 'Кв. метры', to: v=>v, from: v=>v },
                ha: { n: 'Гектары', to: v=>v*10000, from: v=>v/10000 },
                km2: { n: 'Кв. километры', to: v=>v*1e6, from: v=>v/1e6 }
            },
            comparisons: [
                { name: 'площадей Москвы', val: 900000000 },
                { name: 'площадей Красной площади', val: 46450 },
                { name: 'площадей России', val: 17125191000000 },
                { name: 'листов А4', val: 0.062 }
            ],
            def1: 'm2', def2: 'ha'
        },
        weight: {
            name: 'Вес и масса',
            units: {
                g: { n: 'Граммы', to: v=>v*0.001, from: v=>v/0.001 },
                kg: { n: 'Килограммы', to: v=>v, from: v=>v },
                t: { n: 'Тонны', to: v=>v*1000, from: v=>v/1000 },
                lb: { n: 'Фунты', to: v=>v*0.453592, from: v=>v/0.453592 }
            },
            comparisons: [
                { name: 'масс слона', val: 5000 },
                { name: 'масс автомобиля', val: 1230 },
                { name: 'пачек сахара', val: 1 },
                { name: 'котов', val: 5 }
            ],
            def1: 'kg', def2: 't'
        },
        speed: {
            name: 'Скорость',
            units: {
                ms: { n: 'Метры в секунду', to: v=>v, from: v=>v },
                kmh: { n: 'Километры в час', to: v=>v/3.6, from: v=>v*3.6 },
                mph: { n: 'Мили в час', to: v=>v*0.44704, from: v=>v/0.44704 }
            },
            comparisons: [
                { name: 'скоростей звука', val: 340.29 },
                { name: 'скоростей Сапсана', val: 69.4 },
                { name: 'скоростей СУ-57', val: 722.2 },
                { name: 'скоростей человека', val: 1.38 }
            ],
            def1: 'kmh', def2: 'ms'
        },
        power: {
            name: 'Мощность',
            units: {
                w: { n: 'Ватты', to: v=>v, from: v=>v },
                kw: { n: 'Киловатты', to: v=>v*1000, from: v=>v/1000 },
                hp: { n: 'Лошадиные силы', to: v=>v*735.5, from: v=>v/735.5 }
            },
            comparisons: [
                { name: 'мощностей двигателя Lada', val: 78000 },
                { name: 'мощностей электрочайника', val: 2000 },
                { name: 'мощностей лампочек', val: 60 }
            ],
            def1: 'kw', def2: 'hp'
        },
        energy: {
            name: 'Энергия',
            units: {
                j: { n: 'Джоули', to: v=>v, from: v=>v },
                kcal: { n: 'Килокалории', to: v=>v*4184, from: v=>v/4184 },
                kwh: { n: 'Киловатт-часы', to: v=>v*3600000, from: v=>v/3600000 }
            },
            comparisons: [
                { name: 'месячных норм потребления квартиры', val: 720000000 },
                { name: 'энергий выстрела АК-74', val: 1377 },
                { name: 'плиток шоколада', val: 2300000 }
            ],
            def1: 'kwh', def2: 'kcal'
        },
        volume: {
            name: 'Объем',
            units: {
                ml: { n: 'Миллилитры', to: v=>v*0.001, from: v=>v/0.001 },
                l: { n: 'Литры', to: v=>v, from: v=>v },
                m3: { n: 'Куб. метры', to: v=>v*1000, from: v=>v/1000 }
            },
            comparisons: [
                { name: 'ванн', val: 150 },
                { name: 'канистр', val: 20 },
                { name: 'баклажка', val: 5 },
                { name: 'стаканов', val: 0.2 }
            ],
            def1: 'l', def2: 'm3'
        },
        data: {
            name: 'Данные',
            units: {
                b: { n: 'Байты', to: v=>v, from: v=>v },
                mb: { n: 'Мегабайты', to: v=>v*1048576, from: v=>v/1048576 },
                gb: { n: 'Гигабайты', to: v=>v*1073741824, from: v=>v/1073741824 },
                tb: { n: 'Терабайты', to: v=>v*1099511627776, from: v=>v/1099511627776 }
            },
            comparisons: [
                { name: 'фильмов в Full HD', val: 4294967296 },
                { name: 'фотографий со смартфона', val: 5242880 },
                { name: 'песен в MP3', val: 7340032 }
            ],
            def1: 'gb', def2: 'mb'
        }
    };

    let activeBox = 1;
    let inputs = { 1: '0', 2: '0' };
    
    function init() {
        const catSelect = document.getElementById('category-select');
        for (let key in categories) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = categories[key].name;
            catSelect.appendChild(opt);
        }
        changeCategory();
    }

    function toggleNav() {
        document.getElementById('left-nav').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function setActiveBox(boxId) {
        activeBox = boxId;
        document.getElementById('box1').classList.remove('active');
        document.getElementById('box2').classList.remove('active');
        document.getElementById('box' + boxId).classList.add('active');
    }

    function changeCategory() {
        let catKey = document.getElementById('category-select').value;
        let cat = categories[catKey];
        
        let u1 = document.getElementById('unit1');
        let u2 = document.getElementById('unit2');
        
        u1.innerHTML = '';
        u2.innerHTML = '';
        
        for (let uKey in cat.units) {
            let opt1 = document.createElement('option');
            opt1.value = uKey; opt1.innerText = cat.units[uKey].n;
            let opt2 = document.createElement('option');
            opt2.value = uKey; opt2.innerText = cat.units[uKey].n;
            
            u1.appendChild(opt1);
            u2.appendChild(opt2);
        }
        
        u1.value = cat.def1;
        u2.value = cat.def2;
        
        clearAll();
    }

    function swapUnits() {
        let u1 = document.getElementById('unit1');
        let u2 = document.getElementById('unit2');
        let temp = u1.value;
        u1.value = u2.value;
        u2.value = temp;
        calculate(activeBox);
    }

    function unitChanged() {
        calculate(activeBox);
    }

    function insert(val) {
        if (inputs[activeBox] === '0' && val !== '.') {
            inputs[activeBox] = val;
        } else {
            if (val === '.' && inputs[activeBox].includes('.')) return;
            inputs[activeBox] += val;
        }
        calculate(activeBox);
    }

    function backspace() {
        if (inputs[activeBox].length > 1) {
            inputs[activeBox] = inputs[activeBox].slice(0, -1);
            if (inputs[activeBox] === '-' || inputs[activeBox] === '-0') inputs[activeBox] = '0';
        } else {
            inputs[activeBox] = '0';
        }
        calculate(activeBox);
    }

    function clearAll() {
        inputs[1] = '0';
        inputs[2] = '0';
        updateDisplays();
        updateComparisons();
    }

    function toggleSign() {
        if (inputs[activeBox] !== '0' && inputs[activeBox] !== '0.') {
            if (inputs[activeBox].startsWith('-')) {
                inputs[activeBox] = inputs[activeBox].substring(1);
            } else {
                inputs[activeBox] = '-' + inputs[activeBox];
            }
            calculate(activeBox);
        }
    }

    function calculate(sourceBox) {
        let targetBox = sourceBox === 1 ? 2 : 1;
        let valStr = inputs[sourceBox];
        if (valStr.endsWith('.')) valStr = valStr.slice(0, -1);
        let val = parseFloat(valStr);
        if (isNaN(val)) val = 0;
        
        let cat = categories[document.getElementById('category-select').value];
        let uFrom = document.getElementById('unit' + sourceBox).value;
        let uTo = document.getElementById('unit' + targetBox).value;
        
        let baseVal = cat.units[uFrom].to(val);
        let resVal = cat.units[uTo].from(baseVal);
        
        resVal = Number(resVal.toPrecision(10));
        
        inputs[targetBox] = resVal.toString();
        
        updateDisplays();
        updateComparisons(baseVal, cat);
    }

    function formatNumber(numStr) {
        if (numStr === '0') return '0';
        let num = parseFloat(numStr);
        if (isNaN(num)) return numStr;
        
        if (Math.abs(num) > 0 && (Math.abs(num) < 1e-6 || Math.abs(num) > 1e11)) {
            return num.toExponential(4).replace('.', ',').replace('e', ' * 10^');
        }
        
        return numStr.replace('.', ',');
    }

    function updateDisplays() {
        [1, 2].forEach(id => {
            let el = document.getElementById('val' + id);
            el.innerText = formatNumber(inputs[id]);
            if (el.innerText.length > 12) {
                el.style.fontSize = Math.max(20, 38 - (el.innerText.length - 12) * 1.5) + 'px';
            } else {
                el.style.fontSize = '38px';
            }
        });
    }

    function updateComparisons(baseVal, cat) {
        let compDiv = document.getElementById('comparisons');
        if (!cat.comparisons || cat.comparisons.length === 0 || baseVal === 0 || isNaN(baseVal)) {
            compDiv.innerHTML = '';
            return;
        }
        
        let html = '<div class="comp-title">Примерно равно:</div>';
        let added = 0;
        
        cat.comparisons.forEach(c => {
            let ratio = baseVal / c.val;
            if (ratio > 0.005 && ratio < 1000000) {
                html += `<div class="comp-item"><span>${Number(ratio.toPrecision(3)).toString().replace('.', ',')} ${c.name}</span></div>`;
                added++;
            }
        });
        
        compDiv.innerHTML = added > 0 ? html : '';
    }

    document.addEventListener('keydown', (e) => {
        const keyMap = {
            'Backspace': '⌫', 'Escape': 'C', 'Delete': 'C',
            ',': '.', '.': '.'
        };
        
        if (/[0-9]/.test(e.key)) { insert(e.key); }
        else if (keyMap[e.key]) {
            e.preventDefault();
            if (keyMap[e.key] === '⌫') backspace();
            else if (keyMap[e.key] === 'C') clearAll();
            else insert(keyMap[e.key]);
        }
    });

    window.onload = init;
</script>
</body>
</html>
